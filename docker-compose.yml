services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-pomni}_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-Pomni}
      MYSQL_USER: ${DB_USER:-pomni}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pomnipassword}
    volumes:
      - pomni_mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - pomni_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-pomni}_backend
    volumes:
      - ./backend:/app
    expose:
      - "8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-Pomni}
      - DB_USER=${DB_USER:-pomni}
      - DB_PASSWORD=${DB_PASSWORD:-pomnipassword}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,patitema-site.ru,api.patitema-site.ru,148.253.208.46}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001,https://patitema-site.ru}
      - DJANGO_SECURE_SSL_REDIRECT=${DJANGO_SECURE_SSL_REDIRECT:-False}
      - DJANGO_SECURE_PROXY_SSL_HEADER=${DJANGO_SECURE_PROXY_SSL_HEADER:-False}
      - DJANGO_SESSION_COOKIE_SECURE=${DJANGO_SESSION_COOKIE_SECURE:-False}
      - DJANGO_CSRF_COOKIE_SECURE=${DJANGO_CSRF_COOKIE_SECURE:-False}
      - DJANGO_SECURE_HSTS_SECONDS=${DJANGO_SECURE_HSTS_SECONDS:-0}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pomni_network
    command: >
      sh -c "python manage.py wait_for_db --timeout 90 &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: ${COMPOSE_PROJECT_NAME:-pomni}_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-/api}
    depends_on:
      - backend
    networks:
      - pomni_network

networks:
  pomni_network:
    driver: bridge

volumes:
  pomni_mysql_data:
