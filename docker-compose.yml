version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-pomni}_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-Pomni}
      MYSQL_USER: ${DB_USER:-pomni}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pomnipassword}
    volumes:
      - pomni_mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - pomni_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-pomni}_backend
    volumes:
      - ./backend:/app
    expose:
      - "8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-Pomni}
      - DB_USER=${DB_USER:-pomni}
      - DB_PASSWORD=${DB_PASSWORD:-pomnipassword}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pomni_network
    command: >
      sh -c "
        until python manage.py migrate 2>&1; do
          echo 'Waiting for database...';
          sleep 2;
        done &&
        python manage.py runserver 0.0.0.0:8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-pomni}_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - pomni_network

networks:
  pomni_network:
    driver: bridge

volumes:
  pomni_mysql_data:
