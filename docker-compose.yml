version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: pomni_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: Pomni
      MYSQL_USER: pomni
      MYSQL_PASSWORD: pomnipassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - pomni_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pomni_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=Pomni
      - DB_USER=pomni
      - DB_PASSWORD=pomnipassword
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pomni_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pomni_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=/api
    depends_on:
      - backend
    networks:
      - pomni_network
    command: npm start

networks:
  pomni_network:
    driver: bridge

volumes:
  mysql_data:
